# kedro-mlflow configuration file
# Schema version for kedro-mlflow 2.0.2

# server configuration
# In MLflow 3.10+, filesystem storage (mlruns/) is deprecated.
# We transition to a database backend (SQLite by default).
server:
  mlflow_tracking_uri: sqlite:///mlflow.db
  mlflow_registry_uri: sqlite:///mlflow.db

# tracking configuration
tracking:
  experiment:
    name: next_load_forecasting
  
  run:
    name: energy_load_elt
    nested: true

# UI configuration
ui:
  port: "5000"
  host: 127.0.0.1
