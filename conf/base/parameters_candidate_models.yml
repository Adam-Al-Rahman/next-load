# Parameters for the candidate_models pipeline

candidate_models:
  target_column: "actual_demand_mw"
  date_column: "timestamp"
  id_column: "unique_id"
  freq: "15m"
  forecast_horizon: 96
  
  preprocessing:
    outlier_iqr_multiplier: 1.5
    imputation_lgb_params:
      n_estimators: 150
      learning_rate: 0.05
      random_state: 42
      n_jobs: 1
      verbose: -1
    imputation_features:
      - "sin_hour"
      - "cos_hour"
      - "sin_weekday"
      - "cos_weekday"
      - "sin_dayofyear"
      - "cos_dayofyear"
      - "y_yesterday"
      - "y_last_week"
      - "y_last_year"

  lgbm_mlforecast:
    optuna_trials: 40
    n_windows_cv: 5
    lags: [1, 96, 97, 672]
    # Lags for the complex models can be different, we'll handle that in code or sub-params
    variants:
      - name: "lgbm_stable"
        type: "stable" # No lags, pure harmonics
      - name: "lgbm_anchored"
        type: "anchored" # L1 loss, anchored lags
      - name: "lgbm_ensemble"
        type: "ensemble" # Huber + MAE ensemble

  neuralforecast:
    max_steps: 1000
    batch_size: 32
    learning_rate: 0.001
    lookback: 672 # 96 * 7
    random_seed: 42
