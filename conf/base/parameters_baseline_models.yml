baseline_models:
  target_column: actual_demand_mw
  date_column: timestamp
  daily_season: 96
  horizon: 96
  outlier_iqr_multiplier: 1.5
  lgb_params:
    n_estimators: 150
    learning_rate: 0.05
    random_state: 42
    n_jobs: -1
    verbose: -1
  features:
    - sin_hour
    - cos_hour
    - sin_weekday
    - cos_weekday
    - sin_dayofyear
    - cos_dayofyear
    - y_yesterday
    - y_last_week
    - y_last_year
